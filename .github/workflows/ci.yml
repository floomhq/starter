name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate manifest.json schema
        run: |
          set -eo pipefail
          MANIFEST=manifest.json
          if [ ! -f "$MANIFEST" ]; then
            echo "::error::manifest.json not found at repo root"
            exit 1
          fi
          echo "Validating $MANIFEST"
          python3 << 'PYEOF'
          import json, sys
          with open("manifest.json") as f:
              d = json.load(f)
          assert "skills" in d, "missing skills array"
          assert "profiles" in d, "missing profiles array"
          assert isinstance(d["skills"], list), "skills must be array"
          n = len(d["skills"])
          assert n == 65, f"expected exactly 65 skills, got {n}"
          for s in d["skills"]:
              for k in ("slug", "name", "description", "profiles"):
                  assert k in s, f"skill missing required field {k}: {s.get('slug', '?')}"
          print(f"OK: {n} skills, {len(d['profiles'])} profiles")
          PYEOF

  validate-skill-jsons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate every per-skill JSON has content
        run: |
          set -eo pipefail
          SKILLS_DIR=skills
          if [ ! -d "$SKILLS_DIR" ]; then
            echo "::error::skills/ dir not found at repo root"
            exit 1
          fi
          echo "Scanning $SKILLS_DIR"
          MISSING=0
          TOTAL=0
          for f in "$SKILLS_DIR"/*.json; do
            [ -f "$f" ] || continue
            TOTAL=$((TOTAL+1))
            CONTENT_LEN=$(python3 -c "import json,sys; print(len(json.load(open(sys.argv[1])).get('skill_md_content','')))" "$f")
            if [ "$CONTENT_LEN" -eq 0 ]; then
              echo "::error file=$f::skill_md_content is empty (enrichment regression)"
              MISSING=$((MISSING+1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "::error::$MISSING per-skill JSONs have empty content"
            exit 1
          fi
          echo "OK: $TOTAL per-skill JSONs all have content"

  cli-smoke:
    runs-on: ubuntu-latest
    needs: [validate-manifest, validate-skill-jsons]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Local CLI smoke test
        run: |
          set -eo pipefail
          CLI_DIR="$(pwd)/cli"
          if [ ! -f "$CLI_DIR/package.json" ]; then
            echo "::error::cli/package.json not found"
            exit 1
          fi
          echo "CLI dir: $CLI_DIR"
          cd "$CLI_DIR"
          npm install --no-audit --no-fund
          npm run build --if-present
          npm pack
          TGZ=$(ls floomhq-starter-*.tgz | head -1)
          ABS_TGZ="$CLI_DIR/$TGZ"
          TEST_DIR=$(mktemp -d)
          cd "$TEST_DIR"
          npm init -y > /dev/null
          npm install "$ABS_TGZ" --no-audit --no-fund
          ./node_modules/.bin/starter install --harness claude --profiles core --yes
          # CLI 0.2.3 writes globally to ~/.claude/skills. CLI 0.2.4+ adds project-local
          # default at ./.claude/skills. Accept either layout to keep CI green across the
          # version transition. Use || true so set -e does not fail when one path is absent.
          GLOBAL_COUNT=$(find "$HOME/.claude/skills" -name SKILL.md 2>/dev/null | wc -l || true)
          LOCAL_COUNT=$(find ./.claude/skills -name SKILL.md 2>/dev/null | wc -l || true)
          COUNT=$((GLOBAL_COUNT + LOCAL_COUNT))
          echo "Global SKILL.md count: $GLOBAL_COUNT"
          echo "Local SKILL.md count: $LOCAL_COUNT"
          echo "Total: $COUNT"
          if [ "$COUNT" -lt 5 ]; then
            echo "::error::Only $COUNT SKILL.md files written, expected at least 5"
            ls -la "$HOME/.claude/" 2>/dev/null || echo "no global ~/.claude"
            ls -la ./.claude/ 2>/dev/null || echo "no local ./.claude"
            exit 1
          fi
          echo "OK: $COUNT skill files written"
