<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Floom Starter Pack — X/Twitter Banner</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #fafaf7;
    --ink: #050505;
    --muted: #4b4b4b;
    --blue: #0094ff;
    --blue-pale: #eaf7ff;
    --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --mono: "JetBrains Mono", "SF Mono", ui-monospace, Menlo, Monaco, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1500px;
    height: 500px;
    overflow: hidden;
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    color: var(--ink);
  }
  body {
    background:
      radial-gradient(circle at 8% 20%, rgba(0, 148, 255, 0.18), transparent 32rem),
      radial-gradient(circle at 95% 5%, rgba(255, 79, 216, 0.10), transparent 28rem),
      var(--paper);
    padding: 40px 56px;
    position: relative;
  }
  /* Twitter overlays a profile pic ~150px circle bottom-left.
     We add a generous safe area: nothing critical in bottom-left 280x220 box. */
  .stage {
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: 320px 1fr 320px;
    grid-template-rows: 1fr auto;
    gap: 0 32px;
    align-items: center;
  }
  .wordmark {
    grid-column: 1;
    grid-row: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-self: center;
    /* sit above safe area */
    margin-top: -40px;
  }
  .wordmark strong {
    font-size: 88px;
    font-weight: 900;
    letter-spacing: -0.06em;
    line-height: 0.9;
    color: var(--ink);
  }
  .wordmark span {
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .center {
    grid-column: 2;
    grid-row: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 18px;
    text-align: center;
  }
  h1 {
    font-size: 88px;
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 0.95;
    color: var(--ink);
  }
  h1 em {
    font-style: normal;
    color: var(--blue);
    font-weight: 700;
  }
  .sub {
    font-size: 20px;
    font-weight: 600;
    color: var(--muted);
    line-height: 1.4;
    max-width: 720px;
  }
  .right {
    grid-column: 3;
    grid-row: 1;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    justify-content: center;
    gap: 14px;
    text-align: right;
  }
  .url {
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .pill {
    display: inline-flex;
    align-items: center;
    border: 2px solid var(--ink);
    border-radius: 999px;
    background: var(--blue-pale);
    padding: 8px 14px;
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink);
    line-height: 1;
  }
  .terminal-row {
    grid-column: 2;
    grid-row: 2;
    display: flex;
    justify-content: center;
    align-items: center;
    padding-top: 8px;
  }
  .terminal {
    display: inline-flex;
    align-items: center;
    background: var(--ink);
    color: #ffffff;
    border-radius: 16px;
    padding: 14px 22px;
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: 0;
    border: 2px solid var(--ink);
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="wordmark">
      <strong>floom</strong>
      <span>Open source &middot; MIT</span>
    </div>

    <div class="center">
      <h1>65 curated <em>skills.</em></h1>
      <p class="sub">Synced across Claude, Codex, Cursor, Kimi, OpenCode</p>
    </div>

    <div class="right">
      <div class="pill">Starter Pack</div>
      <div class="url">starter.floom.dev</div>
    </div>

    <div class="terminal-row">
      <div class="terminal">$ npx @floomhq/starter install</div>
    </div>
  </div>
</body>
</html>
